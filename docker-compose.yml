services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: fightthefascists
      POSTGRES_USER: ftf
      POSTGRES_PASSWORD: ftf
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ftf -d fightthefascists"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/fightthefascists
      SPRING_DATASOURCE_USERNAME: ftf
      SPRING_DATASOURCE_PASSWORD: ftf
      SPRING_DATA_REDIS_HOST: redis
      FTF_DEVICE_PEPPER: change-me-in-production-use-secret-manager
      FTF_ENCRYPTION_KEY: dev-encryption-key-32bytes-long!!
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
