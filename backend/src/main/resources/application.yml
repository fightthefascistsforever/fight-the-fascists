spring:
  application:
    name: fight-the-fascists
  r2dbc:
    url: r2dbc:postgresql://localhost:5432/fightthefascists
    username: ftf
    password: ftf
  datasource:
    url: jdbc:postgresql://localhost:5432/fightthefascists
    username: ftf
    password: ftf
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: localhost
      port: 6379

server:
  port: 8080

ftf:
  device-pepper: dev-pepper-change-in-production-32b
  encryption-key: dev-encryption-key-32bytes-long!!
  pow-secret: dev-pow-secret-change-me
  pow-difficulty: 12
  cors-allowed-origin: http://localhost:5173

management:
  endpoints:
    web:
      exposure:
        include: health

logging:
  level:
    com.fightthefascists: INFO
